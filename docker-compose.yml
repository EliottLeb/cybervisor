version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - sqlite_data:/app/prisma
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - sqlite_data:/app/prisma
    restart: unless-stopped

volumes:
  sqlite_data:
