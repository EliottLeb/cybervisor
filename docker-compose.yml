version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - sqlite_data:/app/prisma
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - sqlite_data:/app/prisma
    restart: unless-stopped

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
